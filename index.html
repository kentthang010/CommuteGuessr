<!doctype html>
<html>
  <head>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      href="https://unpkg.com/tailwindcss@^1.0/dist/tailwind.min.css"
      rel="stylesheet"
    />
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css"
    />
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <script src="map.js" defer></script>
    <link rel="stylesheet" href="styles.css" />
    <title>CommuteGuessr</title>
  </head>

  <body style="background-color: #faf3e1">
    <div
      class="container mx-auto flex flex-col my-auto items-center justify-center h-screen"
    >
      <h1 class="text-3xl font-bold">CommuteGuessr</h1>
      <p>Guess your commute time!</p>
	  <div class="flex flex-row gap-1">
		<p>Mode of transport: </p>
		<p id="transportmodeimgid"></p>
	  </div>
      <div class="w-75 h-75" id="map"></div>
      <button
        type="button"
        class="btn btn-primary"
        onclick="randomizeLocation()"
      >
        Randomize Location
      </button>
    </div>
  </body>
</html>
