<!doctype html>
<html>
	<head>
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
			rel="stylesheet"
			integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
			crossorigin="anonymous"
		/>
		<link
			href="https://unpkg.com/tailwindcss@^1.0/dist/tailwind.min.css"
			rel="stylesheet"
		/>
		<link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
		<link
			rel="stylesheet"
			href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
			integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
			crossorigin=""
		/>
		<link
			rel="stylesheet"
			href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css"
		/>
		<script
			src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
			integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
			crossorigin=""
		></script>
		<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
		<script src="map.js" defer></script>
		<link rel="stylesheet" href="styles.css" />
		<title>CommuteGuessr</title>
	</head>

	<body style="background-color: #faf3e1">
		<div
			class="container mx-auto flex flex-col my-auto items-center justify-center h-screen gap-1"
		>
			<h1 class="text-3xl font-bold">CommuteGuessr</h1>
			<div class="w-75 h-75" id="map"></div>
			<!-- Used for debugging -->
			<!-- <button
				type="button"
				class="btn btn-primary"
				onclick="randomizeLocation()"
			>
				Randomize Location
			</button> -->
			<p>Guess your commute time!</p>
			<form class="flex flex-col" id="guessForm" name="guessForm">
				<div class="flex flex-row">
					<input
						type="text"
						id="guessH"
						class="form-control"
						placeholder="Enter your guess in hours"
					/>
					<input
						type="text"
						id="guessM"
						class="form-control"
						placeholder="Enter your guess in minutes"
					/>
				</div>
				<input
					type="submit"
					class="btn btn-primary"
					value="Submit Guess"
				/>
			</form>
			<div
				class="mx-auto flex flex-col items-center justify-center gap-1 hidden"
				id="scoreDisplay"
			>
				<p id="scoreText"></p>
				<p id="guessDistanceText"></p>
				<button
					type="button"
					class="btn btn-primary"
					onclick="nextRound()"
				>
					Next Round
				</button>
			</div>
		</div>
	</body>
</html>
